binary: /usr/bin/dig
description: "DNS lookup utility"
protocols:
  - name: dns
    transport: udp
    description: "DNS queries — can encode data in query names for DNS exfiltration"
    bypasses_l7: true
    actions:
      - { name: query, type: read, description: "DNS lookup" }
spawns: []
can_exfiltrate: true
exfil_mechanism: "Encode data in DNS query labels (e.g., base64.data.attacker.com) — DNS exfiltration"
can_construct_http: false
