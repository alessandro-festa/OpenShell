binary: /usr/bin/nslookup
description: "DNS lookup utility (legacy)"
protocols:
  - name: dns
    transport: udp
    description: "DNS queries"
    bypasses_l7: true
    actions:
      - { name: query, type: read }
spawns: []
can_exfiltrate: true
exfil_mechanism: "DNS exfiltration via crafted query names"
can_construct_http: false
