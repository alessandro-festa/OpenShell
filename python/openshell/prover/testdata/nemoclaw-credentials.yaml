credentials:
  - name: github-pat
    type: github-pat
    scopes:
      - repo
    injected_via: GITHUB_TOKEN
    target_hosts:
      - api.github.com
      - github.com

  - name: nvidia-api-key
    type: api-key
    scopes:
      - inference
      - nvcf-management
    injected_via: NVIDIA_API_KEY
    target_hosts:
      - integrate.api.nvidia.com
      - inference-api.nvidia.com

  - name: anthropic-api-key
    type: api-key
    scopes:
      - inference
    injected_via: ANTHROPIC_API_KEY
    target_hosts:
      - api.anthropic.com

  - name: telegram-bot-token
    type: bot-token
    scopes:
      - bot
    injected_via: TELEGRAM_BOT_TOKEN
    target_hosts:
      - api.telegram.org

  - name: discord-bot-token
    type: bot-token
    scopes:
      - bot
    injected_via: DISCORD_BOT_TOKEN
    target_hosts:
      - discord.com
      - gateway.discord.gg
      - cdn.discordapp.com
